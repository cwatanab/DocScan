<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>DocScan</title>
    
    <!-- iOS PWA settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DocScan" />
    
    <!-- Load OpenCV.js asynchronously -->
    <script>
      console.log("[OpenCV] Initializing window.Module setup...");
      window.Module = {
        onRuntimeInitialized: function() {
          console.log("[OpenCV] onRuntimeInitialized callback triggered!");
          window.cvState = 'ready';
          window.dispatchEvent(new Event('opencv-ready'));
        }
      };
    </script>
    <script 
      async 
      src="/opencv.js" 
      onload="console.log('[OpenCV] opencv.js script tag successfully loaded')" 
      onerror="console.error('[OpenCV] opencv.js script tag failed to load')"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
